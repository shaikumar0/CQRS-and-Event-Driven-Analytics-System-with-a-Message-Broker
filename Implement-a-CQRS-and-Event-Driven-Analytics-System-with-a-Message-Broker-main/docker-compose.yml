version: "3.8"

services:

  db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: write_db
    ports:
      - "3307:3306"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  broker:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      retries: 5

  command-service:
    build: ./command-service
    ports:
      - "8080:8080"
    depends_on:
      - db
      - broker
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: write_db
      RABBITMQ_URL: amqp://guest:guest@broker:5672

  query-service:
    build: ./query-service
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: write_db

  consumer-service:
    build: ./consumer-service
    depends_on:
      - broker
    environment:
      RABBITMQ_URL: amqp://guest:guest@broker:5672